name: Bootstrap

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install dependencies
      run: sudo apt install ninja-build meson gcc gperf protoc-gen-go python3 -y

    - name: Bootstrap build
      run: python3 bootstrap.py --bootstrap

    - name: Clone source
      run: git clone --depth 1 https://github.com/systemd/systemd llvm-source

    - name: Configure
      run: |
          cd llvm-source
          meson setup ../llvm-build

    - name: Build with ninja_monitor
      run: |
        cd llvm-build
        ../build/out/bin/ninja_monitor --ninja ../build/out/bin/ninja_mod

    - name: Test verbose
      run: |
        cd llvm-build
        cp .ninja_log log
        ninja clean
        cp log .ninja_log
        ../build/out/bin/ninja_monitor --ninja ../build/out/bin/ninja_mod --verbose
