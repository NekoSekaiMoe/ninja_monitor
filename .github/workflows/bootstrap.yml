name: Bootstrap

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install dependencies
      run: sudo apt install ninja-build cmake gcc g++ python3 -y

    - name: Bootstrap build
      run: python3 bootstrap.py --bootstrap

    - name: Clone source
      run: git clone --depth 1 https://github.com/kitware/cmake.git llvm-source

    - name: Configure
      run: |
        cmake -S llvm-source -B llvm-build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build with ninja_monitor
      run: |
        cd llvm-build
        ../build/ninja_monitor --ninja ../build/ninja_stage2/ninja_mod
