name: LLVM Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  llvm-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install dependencies
      run: sudo apt install ninja-build cmake gcc g++ python3 -y

    - name: Bootstrap build
      run: python3 bootstrap.py --bootstrap

    - name: Clone LLVM source
      run: git clone --depth 1 https://github.com/llvm/llvm-project.git llvm-source

    - name: Configure LLVM
      run: |
        cmake -S llvm-source/llvm -B llvm-build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_TARGETS_TO_BUILD=X86 \
          -DLLVM_ENABLE_BINDINGS=OFF \
          -DLLVM_ENABLE_DOXYGEN=OFF \
          -DLLVM_ENABLE_TESTS=OFF \
          -DLLVM_ENABLE_EXAMPLES=OFF \
          -DLLVM_ENABLE_BENCHMARKS=OFF

    - name: Build with ninja_monitor
      run: |
        cd llvm-build
        ../build/ninja_monitor --ninja ../build/ninja_stage2/ninja_mod
